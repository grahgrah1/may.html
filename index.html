<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ตรวจตราส่งดอก</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  text-align:center;
  padding:40px;
}
.box{
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:520px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,0.12);
}
h1{ color:#d8232a; }
img{
  max-width:100%;
  margin-top:20px;
  border-radius:12px;
  display:none;
}
#result{
  margin-top:25px;
  font-size:26px;
  font-weight:bold;
}
.success{ color:green; }
.danger{ color:#d8232a; }
.loading{ color:#555; }
</style>
</head>

<body>

<div class="box">
  <h1>🔍 AI ตรวจตราส่งดอก</h1>

  <input type="file" id="imageUpload" accept="image/*" disabled>

  <br>

  <img id="preview" alt="ภาพตัวอย่าง">

  <div id="result" class="loading">กำลังโหลดโมเดล...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/0zaFwUMQ3/";

let model = null;

const resultBox = document.getElementById("result");
const imageUpload = document.getElementById("imageUpload");
const preview = document.getElementById("preview");

async function loadModel(){
  try{
    resultBox.innerHTML = "กำลังโหลดโมเดล...";
    resultBox.className = "loading";

    await tf.ready();

    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    imageUpload.disabled = false;

    resultBox.innerHTML = "พร้อมตรวจภาพแล้ว ✅";
    resultBox.className = "success";

  }catch(error){
    resultBox.innerHTML = "โหลดโมเดลไม่สำเร็จ ❌<br>ให้เช็กอินเทอร์เน็ตหรือลิงก์โมเดล";
    resultBox.className = "danger";
    console.error(error);
  }
}

loadModel();

imageUpload.addEventListener("change", async function(event){
  const file = event.target.files[0];
  if(!file) return;

  if(!model){
    resultBox.innerHTML = "โมเดลยังไม่พร้อม ❌";
    resultBox.className = "danger";
    return;
  }

  preview.src = URL.createObjectURL(file);
  preview.style.display = "block";

  preview.onload = async function(){
    try{
      resultBox.innerHTML = "กำลังตรวจภาพ...";
      resultBox.className = "loading";

      const prediction = await model.predict(preview);

      prediction.sort((a,b) => b.probability - a.probability);

      const top = prediction[0];
      const percent = (top.probability * 100).toFixed(2);

      resultBox.innerHTML = `${top.className}<br>${percent}%`;

      if(top.probability >= 0.8){
        resultBox.className = "success";
      }else{
        resultBox.className = "danger";
      }

    }catch(error){
      resultBox.innerHTML = "ตรวจภาพไม่สำเร็จ ❌";
      resultBox.className = "danger";
      console.error(error);
    }
  };
});
</script>

</body>
</html>
