<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI ตรวจประเภทตั๋วจำนำ</title>

<style>

body{
  margin:0;
  padding:40px;
  min-height:100vh;

  font-family:"Prompt",sans-serif;

  background:
  radial-gradient(circle at top,#ffd56b 0%,transparent 25%),
  linear-gradient(135deg,#6e0000,#b60000 45%,#7a0000);

  text-align:center;
}

.box{

  max-width:650px;
  margin:auto;

  background:
  linear-gradient(180deg,#fffdf5,#fff);

  border-radius:30px;

  padding:35px;

  border:4px solid #d4af37;

  box-shadow:
  0 15px 40px rgba(0,0,0,0.35),
  inset 0 0 0 3px rgba(255,215,0,0.3);

}

.logo{

  font-size:60px;
  margin-bottom:10px;

}

h1{

  color:#b00000;
  margin:0;

  font-size:42px;

  text-shadow:
  1px 1px 0 #ffd700;

}

.subtitle{

  margin-top:10px;
  color:#7a0000;
  font-size:18px;

}

.uploadBox{

  margin-top:30px;

}

input[type="file"]{

  background:#fff8dc;

  border:2px solid #d4af37;

  border-radius:14px;

  padding:12px;

  cursor:pointer;

  font-weight:bold;

}

#preview{

  width:100%;

  margin-top:25px;

  border-radius:20px;

  display:none;

  border:5px solid #d4af37;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.25);

}

#result{

  margin-top:25px;

  padding:20px;

  border-radius:20px;

  font-size:34px;

  font-weight:900;

  background:
  linear-gradient(135deg,#fff3b0,#ffd700);

  border:3px solid #b8860b;

  color:#7a0000;

  box-shadow:
  0 8px 20px rgba(0,0,0,0.15);

}

.success{
  color:#007a33 !important;
}

.danger{
  color:#c00000 !important;
}

.loading{
  color:#8b5a00 !important;
}

.allResults{

  margin-top:25px;

  text-align:left;

  background:white;

  border-radius:18px;

  padding:20px;

  border:2px solid #d4af37;

}

.item{

  margin-bottom:14px;

}

.bar{

  height:14px;

  background:#eee;

  border-radius:999px;

  overflow:hidden;

  margin-top:5px;

}

.fill{

  height:100%;

  background:
  linear-gradient(90deg,#b00000,#ffd700);

}

.footer{

  margin-top:30px;

  color:white;

  opacity:0.85;

}

</style>
</head>

<body>

<div class="box">

<div class="logo">🏮</div>

<h1>AI ตรวจประเภทตั๋วจำนำ</h1>

<div class="subtitle">
ระบบ AI สำหรับโรงรับจำนำ
</div>

<div class="uploadBox">

<input
type="file"
id="imageUpload"
accept="image/*"
disabled>

</div>

<img id="preview">

<div id="result" class="loading">
กำลังโหลด AI...
</div>

<div id="allResults" class="allResults" style="display:none">
</div>

</div>

<div class="footer">
Yong Long Pawnshop AI System
</div>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<!-- TM -->
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL =
"https://teachablemachine.withgoogle.com/models/8Ohqq2rSR/";

let model;

const upload =
document.getElementById("imageUpload");

const preview =
document.getElementById("preview");

const result =
document.getElementById("result");

const allResults =
document.getElementById("allResults");

async function init(){

  try{

    result.innerHTML =
    "กำลังโหลดโมเดล AI...";

    result.className = "loading";

    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    upload.disabled = false;

    result.innerHTML =
    "พร้อมใช้งาน ✅";

    result.className = "success";

  }catch(err){

    console.error(err);

    result.innerHTML =
    "โหลดโมเดลไม่สำเร็จ ❌";

    result.className = "danger";

  }

}

init();

upload.addEventListener(
"change",
async function(e){

  const file = e.target.files[0];

  if(!file) return;

  preview.src =
  window.URL.createObjectURL(file);

  preview.style.display = "block";

  preview.onload = async function(){

    try{

      result.innerHTML =
      "กำลังตรวจภาพ...";

      result.className = "loading";

      const prediction =
      await model.predict(preview);

      prediction.sort(
        (a,b)=>
        b.probability-a.probability
      );

      const top = prediction[0];

      const percent =
      (top.probability * 100)
      .toFixed(2);

      let icon = "📄";
      let color = "success";

      if(top.className === "จำนำ"){
        icon = "🏦";
      }
      else if(top.className === "ส่งดอก"){
        icon = "💰";
      }
      else if(top.className === "เพิ่มเงิน"){
        icon = "➕";
      }
      else if(top.className === "ลดเงิน"){
        icon = "➖";
        color = "danger";
      }
      else if(top.className === "ไถ่ถอน"){
        icon = "✅";
      }

      result.innerHTML =
      `${icon} ${top.className}<br>${percent}%`;

      result.className = color;

      // แสดงทุกคลาส
      allResults.style.display = "block";

      let html = "";

      prediction.forEach(p=>{

        const pPercent =
        (p.probability * 100)
        .toFixed(2);

        html += `

        <div class="item">

          <strong>
          ${p.className}
          </strong>

          ${pPercent}%

          <div class="bar">
            <div
            class="fill"
            style="
            width:${pPercent}%">
            </div>
          </div>

        </div>

        `;

      });

      allResults.innerHTML = html;

    }catch(err){

      console.error(err);

      result.innerHTML =
      "ตรวจภาพไม่สำเร็จ ❌";

      result.className = "danger";

    }

  };

});

</script>

</body>
</html>
