<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ตรวจตราส่งดอก</title>

<style>
body{
  font-family:sans-serif;
  background:#f2f2f2;
  text-align:center;
  padding:40px;
}

.box{
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:500px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

h1{
  color:#d8232a;
}

img{
  max-width:100%;
  margin-top:20px;
  border-radius:12px;
  display:none;
}

#result{
  margin-top:20px;
  font-size:28px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">

<h1>🔍 AI ตรวจตราส่งดอก</h1>

<input type="file" id="imageUpload" accept="image/*" disabled>

<br>

<img id="preview">

<div id="result">กำลังโหลด AI...</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL = "https://teachablemachine.withgoogle.com/models/0zaFwUMQ3/";

let model;

const result = document.getElementById("result");
const upload = document.getElementById("imageUpload");
const preview = document.getElementById("preview");

async function init(){

  try{

    result.innerHTML = "กำลังโหลดโมเดล...";

    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    result.innerHTML = "พร้อมใช้งาน ✅";

    upload.disabled = false;

  }catch(err){

    console.error(err);

    result.innerHTML = "โหลดโมเดลไม่สำเร็จ ❌";

  }

}

init();

upload.addEventListener("change", async function(e){

  const file = e.target.files[0];

  if(!file) return;

  // แสดงรูป
  preview.src = window.URL.createObjectURL(file);

  preview.style.display = "block";

  preview.onload = async function(){

    try{

      result.innerHTML = "กำลังตรวจภาพ...";

      const prediction = await model.predict(preview);

      prediction.sort((a,b)=>b.probability-a.probability);

      const top = prediction[0];

      const percent =
      (top.probability * 100).toFixed(2);

      result.innerHTML =
      `${top.className} ${percent}%`;

    }catch(err){

      console.error(err);

      result.innerHTML = "ตรวจภาพไม่สำเร็จ ❌";

    }

  };

});

</script>

</body>
</html>
