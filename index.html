<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI ตรวจตราส่งดอก</title>

<style>

body{
  font-family:"Prompt",sans-serif;
  background:
    radial-gradient(circle at top,#ffd56b 0%,transparent 28%),
    linear-gradient(135deg,#7a0000,#c1121f 45%,#8b0000);
  text-align:center;
  padding:40px;
  min-height:100vh;
}

.box{
  background:linear-gradient(180deg,#fffaf0,#ffffff);
  padding:35px;
  border-radius:28px;
  max-width:620px;
  margin:auto;

  box-shadow:
    0 12px 35px rgba(0,0,0,0.35),
    inset 0 0 0 3px #d4af37;

  border:4px solid #b8860b;
}

h1{
  color:#c40000;
  font-size:38px;
  margin-bottom:25px;
  text-shadow:1px 1px 0 #ffd700;
}

input[type="file"]{
  background:#fff8dc;
  border:2px solid #d4af37;
  padding:10px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
}

img{
  max-width:100%;
  margin-top:25px;
  border-radius:18px;
  display:none;

  border:5px solid #d4af37;

  box-shadow:
    0 8px 25px rgba(0,0,0,0.25);
}

#result{
  margin-top:28px;
  font-size:34px;
  font-weight:900;

  padding:18px;

  border-radius:18px;

  background:
    linear-gradient(135deg,#fff3b0,#ffd700);

  color:#8b0000;

  border:3px solid #b8860b;

  box-shadow:
    0 6px 18px rgba(0,0,0,0.2);
}

.success{
  color:#007a33 !important;
}

.danger{
  color:#b00000 !important;
}

.loading{
  color:#8b5a00 !important;
}

.footer{
  margin-top:25px;
  color:white;
  opacity:0.8;
  font-size:14px;
}

</style>
</head>

<body>

<div class="box">

<h1>🔍 AI ตรวจตราส่งดอก</h1>

<input
type="file"
id="imageUpload"
accept="image/*"
disabled>

<br>

<img id="preview">

<div id="result" class="loading">
กำลังโหลด AI...
</div>

</div>

<div class="footer">
ระบบ AI โรงรับจำนำ
</div>

<!-- TensorFlow -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>

<!-- Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<script>

const MODEL_URL =
"https://teachablemachine.withgoogle.com/models/0zaFwUMQ3/";

let model;

const result =
document.getElementById("result");

const upload =
document.getElementById("imageUpload");

const preview =
document.getElementById("preview");

async function init(){

  try{

    result.innerHTML =
    "กำลังโหลดโมเดล...";

    result.className = "loading";

    // โหลดโมเดล
    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    // เปิดปุ่มอัปโหลด
    upload.disabled = false;

    result.innerHTML =
    "พร้อมใช้งาน ✅";

    result.className = "success";

  }catch(err){

    console.error(err);

    result.innerHTML =
    "โหลดโมเดลไม่สำเร็จ ❌";

    result.className = "danger";

  }

}

init();

upload.addEventListener(
"change",
async function(e){

  const file = e.target.files[0];

  if(!file) return;

  // แสดงภาพ
  preview.src =
  window.URL.createObjectURL(file);

  preview.style.display = "block";

  preview.onload = async function(){

    try{

      result.innerHTML =
      "กำลังตรวจภาพ...";

      result.className = "loading";

      // AI Predict
      const prediction =
      await model.predict(preview);

      // เรียงเปอร์เซ็นต์
      prediction.sort(
        (a,b)=>
        b.probability-a.probability
      );

      const top = prediction[0];

      const percent =
      (top.probability * 100)
      .toFixed(2);

      // ตรวจชื่อคลาส
      if(top.className === "ส่งดอก"){

        result.innerHTML =
        `✅ ส่งดอก ${percent}%`;

        result.className = "success";

      }else{

        result.innerHTML =
        `❌ ไม่ส่งดอก ${percent}%`;

        result.className = "danger";

      }

    }catch(err){

      console.error(err);

      result.innerHTML =
      "ตรวจภาพไม่สำเร็จ ❌";

      result.className = "danger";

    }

  };

});

</script>

</body>
</html>
