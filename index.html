<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI ตรวจตราส่งดอก</title>

<style>
body{
  font-family: sans-serif;
  background:#f2f2f2;
  text-align:center;
  padding:40px;
}
.box{
  background:white;
  padding:30px;
  border-radius:20px;
  max-width:520px;
  margin:auto;
  box-shadow:0 5px 20px rgba(0,0,0,0.12);
}
h1{ 
  color:#d8232a; 
}
input{
  margin-top:15px;
}
img{
  max-width:100%;
  margin-top:20px;
  border-radius:12px;
  display:none;
}
#result{
  margin-top:25px;
  font-size:28px;
  font-weight:bold;
}
.success{
  color:green;
}
.danger{
  color:#d8232a;
}
.loading{
  color:#555;
}
</style>
</head>

<body>

<div class="box">
  <h1>🔍 AI ตรวจตราส่งดอก</h1>

  <input type="file" id="imageUpload" accept="image/*">

  <br>

  <img id="preview" alt="ภาพตัวอย่าง">

  <div id="result" class="loading">กำลังโหลดโมเดล...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest"></script>

<script>
const MODEL_URL = "https://teachablemachine.withgoogle.com/models/0zaFwUMQ3/";

let model;
const resultBox = document.getElementById("result");
const imageUpload = document.getElementById("imageUpload");
const preview = document.getElementById("preview");

async function loadModel(){
  try{
    model = await tmImage.load(
      MODEL_URL + "model.json",
      MODEL_URL + "metadata.json"
    );

    resultBox.innerHTML = "พร้อมตรวจภาพแล้ว ✅";
    resultBox.className = "success";

  }catch(error){
    resultBox.innerHTML = "โหลดโมเดลไม่สำเร็จ ❌";
    resultBox.className = "danger";
    console.error(error);
  }
}

loadModel();

imageUpload.addEventListener("change", function(event){
  const file = event.target.files[0];
  if(!file) return;

  preview.src = window.URL.createObjectURL(file);
  preview.style.display = "block";

  resultBox.innerHTML = "กำลังตรวจภาพ...";
  resultBox.className = "loading";

  preview.onload = async function(){
    if(!model){
      resultBox.innerHTML = "โมเดลยังโหลดไม่เสร็จ รอสักครู่...";
      resultBox.className = "loading";
      return;
    }

    try{
      const prediction = await model.predict(preview);

      prediction.sort((a,b) => b.probability - a.probability);

      const top = prediction[0];
      const percent = (top.probability * 100).toFixed(2);

      resultBox.innerHTML = `${top.className} ${percent}%`;

      if(percent >= 80){
        resultBox.className = "success";
      }else{
        resultBox.className = "danger";
      }

    }catch(error){
      resultBox.innerHTML = "ตรวจภาพไม่สำเร็จ ❌";
      resultBox.className = "danger";
      console.error(error);
    }
  };
});
</script>

</body>
</html>
