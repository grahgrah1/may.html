<script>
const MODEL_URL =
"https://teachablemachine.withgoogle.com/models/0zaFwUMQ3/";

let model;

async function loadModel(){
    model = await tmImage.load(
        MODEL_URL + "model.json",
        MODEL_URL + "metadata.json"
    );

    document.getElementById("result").innerHTML =
    "พร้อมตรวจภาพแล้ว ✅";
}

loadModel();

document
.getElementById("imageUpload")
.addEventListener("change", async function(event){

    const file = event.target.files[0];
    if(!file) return;

    if(!model){
        document.getElementById("result").innerHTML =
        "กำลังโหลดโมเดล รอสักครู่...";
        return;
    }

    const img = document.getElementById("preview");

    img.src = window.URL.createObjectURL(file);

    img.onload = async () => {

        const prediction = await model.predict(img);

        prediction.sort((a,b)=>
            b.probability - a.probability
        );

        const top = prediction[0];
        const percent = (top.probability * 100).toFixed(2);

        const result = document.getElementById("result");

        if(top.className === "ส่งดอก"){
            result.innerHTML = `✅ ส่งดอก (${percent}%)`;
            result.className = "success";
        }else{
            result.innerHTML = `❌ ไม่ใช่ส่งดอก (${percent}%)`;
            result.className = "fail";
        }
    };
});
</script>
